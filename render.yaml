services:
  - type: web
    name: myproject-board
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: board-db
          property: connectionString

databases:
  - name: board-db
    plan: free
