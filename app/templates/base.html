<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACTive 동아리</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="/static/style.css?v={{ deployed_at | replace(' ','') | replace(':','') | replace('-','') }}" />
</head>
<body class="mdi-shell">

  <!-- 고정 헤더 -->
  <header class="app-header">
    <button id="sidebarToggle" class="header-toggle">&#9776;</button>
    <a href="#" class="header-brand" onclick="openTab('/home','Home');return false;">ACTive 동아리</a>
    <nav class="header-nav">
      <a href="#" class="header-nav-item" id="nav-member" onclick="activateSection('member');return false;">회원모집</a>
      <a href="#" class="header-nav-item" id="nav-board" onclick="activateSection('board');return false;">게시판</a>
      <a href="#" class="header-nav-item" id="nav-admin" onclick="activateSection('admin');return false;">관리</a>
    </nav>
    <div class="header-right">
      {% if current_operator %}
      <span>{{ current_operator.name }}</span>
      <a href="/auth/logout" style="color:var(--lg-gray-500);margin-left:0.5rem;font-size:0.78rem;text-decoration:none;">로그아웃</a>
      {% else %}
      <a href="/auth/login" style="color:var(--lg-gray-500);text-decoration:none;">로그인</a>
      {% endif %}
    </div>
  </header>

  <!-- 사이드바 백드롭 (모바일용) -->
  <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

  <!-- 바디: 사이드바 + MDI 영역 -->
  <div class="app-body">

    <!-- 사이드바 (Shell 소유, 섹션별로 표시) -->
    <aside id="sidebar" class="app-sidebar">

      <!-- 회원모집 섹션 사이드바 -->
      <div id="sidebar-member" class="sidebar-section" style="display:none">
        <div class="sidebar-section-title">회원모집</div>
        <nav class="sidebar-nav">
          <a href="#" class="sidebar-item" onclick="openTab('/members/','회원조회');return false;">회원조회</a>
          <a href="#" class="sidebar-item" onclick="openTab('/recruit/banner','회원모집 배너');return false;">회원모집 배너</a>
        </nav>
      </div>

      <!-- 게시판 섹션 사이드바 -->
      <div id="sidebar-board" class="sidebar-section" style="display:none">
        <div class="sidebar-section-title">게시판</div>
        <nav class="sidebar-nav">
          <a href="#" class="sidebar-item" onclick="openTab('/board/','게시판');return false;">게시판</a>
          <a href="#" class="sidebar-item" onclick="openTab('/notices/','공지사항');return false;">공지사항</a>
        </nav>
      </div>

      <!-- 관리 섹션 사이드바 -->
      <div id="sidebar-admin" class="sidebar-section" style="display:none">
        <div class="sidebar-section-title">관리</div>
        <nav class="sidebar-nav">
          <a href="#" class="sidebar-item" onclick="openTab('/admin/operators','운영진 관리');return false;">운영진 관리</a>
        </nav>
      </div>

    </aside>

    <!-- MDI 콘텐츠 영역 -->
    <div class="mdi-container" id="mdiContainer">
      <!-- 탭바 -->
      <div class="mdi-tabbar" id="mdiTabBar"></div>
      <!-- iframe 패널 영역 -->
      <div class="mdi-panels" id="mdiPanels"></div>
    </div>

  </div>

  <!-- 푸터 -->
  <footer class="app-footer">
    ACTive 동아리 &nbsp;|&nbsp; 최종 배포: {{ deployed_at }}
  </footer>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmZqZMkiYAAA9gOLJnXExhyS2RnT"
    crossorigin="anonymous"
  ></script>
  <script>
  // ── MDI 탭 관리 ──────────────────────────────
  let tabs = [];
  let activeTabId = null;

  // 초기 Home 탭
  window.addEventListener('DOMContentLoaded', () => {
    openTab('/home', 'Home', false); // false = 닫기 불가
  });

  function openTab(url, title, closeable = true) {
    // 이미 열린 탭이면 활성화
    const existing = tabs.find(t => t.url === url);
    if (existing) { activateTab(existing.id); return; }

    const id = 'tab-' + Date.now();
    tabs.push({ id, url, title, closeable });
    renderTabs();
    activateTab(id);
    updateSidebarByUrl(url);
  }

  function closeTab(id, e) {
    e.stopPropagation();
    const idx = tabs.findIndex(t => t.id === id);
    tabs.splice(idx, 1);
    // 닫힌 탭이 활성이었으면 이전 탭 활성화
    if (activeTabId === id) {
      const nextTab = tabs[Math.max(0, idx - 1)];
      if (nextTab) activateTab(nextTab.id);
    }
    renderTabs();
    // iframe 제거
    const panel = document.getElementById('panel-' + id);
    if (panel) panel.remove();
  }

  function activateTab(id) {
    activeTabId = id;
    // 모든 패널 숨기기
    document.querySelectorAll('.mdi-panel').forEach(p => p.classList.remove('active'));
    const panel = document.getElementById('panel-' + id);
    if (panel) { panel.classList.add('active'); }
    else {
      // 새 iframe 생성
      const tab = tabs.find(t => t.id === id);
      if (tab) {
        const iframe = document.createElement('iframe');
        iframe.id = 'panel-' + id;
        iframe.className = 'mdi-panel active';
        iframe.src = tab.url + (tab.url.includes('?') ? '&' : '?') + 'frame=1';
        document.getElementById('mdiPanels').appendChild(iframe);
      }
    }
    renderTabs();
    // 사이드바 업데이트
    const tab = tabs.find(t => t.id === id);
    if (tab) updateSidebarByUrl(tab.url);
  }

  function renderTabs() {
    const bar = document.getElementById('mdiTabBar');
    bar.innerHTML = tabs.map(t => `
      <div class="mdi-tab ${t.id === activeTabId ? 'active' : ''}" onclick="activateTab('${t.id}')">
        <span class="tab-title">${t.title}</span>
        ${t.closeable ? `<span class="tab-close" onclick="closeTab('${t.id}', event)">&#215;</span>` : ''}
      </div>
    `).join('');
  }

  function isMobile() { return window.innerWidth <= 767; }

  function activateSection(section) {
    document.querySelectorAll('.sidebar-section').forEach(s => s.style.display = 'none');
    const sec = document.getElementById('sidebar-' + section);
    if (sec) sec.style.display = 'block';
    // 헤더 탭 active 표시
    document.querySelectorAll('.header-nav-item').forEach(n => n.classList.remove('active'));
    const navItem = document.getElementById('nav-' + section);
    if (navItem) navItem.classList.add('active');
    // 모바일: 섹션 클릭 시 사이드바 열기
    if (isMobile()) openSidebar();
  }

  function updateSidebarByUrl(url) {
    if (url.startsWith('/members') || url.startsWith('/recruit')) {
      activateSection('member');
    } else if (url.startsWith('/board') || url.startsWith('/notices') || url.startsWith('/posts')) {
      activateSection('board');
    } else if (url.startsWith('/admin')) {
      activateSection('admin');
    }
  }

  // 사이드바 열기/닫기
  function openSidebar() {
    const sb = document.getElementById('sidebar');
    const bd = document.getElementById('sidebarBackdrop');
    if (isMobile()) {
      sb.classList.add('open');
      bd.classList.add('show');
    } else {
      sb.classList.remove('collapsed');
    }
  }
  function closeSidebar() {
    const sb = document.getElementById('sidebar');
    const bd = document.getElementById('sidebarBackdrop');
    if (isMobile()) {
      sb.classList.remove('open');
      bd.classList.remove('show');
    } else {
      sb.classList.add('collapsed');
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    // 햄버거 토글
    document.getElementById('sidebarToggle').addEventListener('click', () => {
      const sb = document.getElementById('sidebar');
      if (isMobile()) {
        sb.classList.contains('open') ? closeSidebar() : openSidebar();
      } else {
        sb.classList.toggle('collapsed');
      }
    });
    // 백드롭 클릭 시 닫기
    document.getElementById('sidebarBackdrop').addEventListener('click', closeSidebar);
    // 사이드바 메뉴 클릭 후 모바일이면 자동 닫기
    document.getElementById('sidebar').addEventListener('click', (e) => {
      if (e.target.closest('.sidebar-item') && isMobile()) {
        setTimeout(closeSidebar, 150);
      }
    });
  });
  </script>
</body>
</html>
