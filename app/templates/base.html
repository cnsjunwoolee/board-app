<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACT 동아리</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- 상단 헤더 -->
  <header class="app-header">
    <button id="sidebarToggle" class="header-toggle" type="button" aria-label="사이드바 토글">&#9776;</button>
    <a href="/" class="header-brand">ACT 동아리</a>
    <nav class="header-nav">
      <a href="/members/"
         class="header-nav-item {% if request.url.path.startswith('/members') or request.url.path.startswith('/recruit') %}active{% endif %}">
        회원모집
      </a>
      <a href="/board/"
         class="header-nav-item {% if request.url.path.startswith('/board') or request.url.path.startswith('/notices') or request.url.path.startswith('/posts') %}active{% endif %}">
        게시판
      </a>
    </nav>
    <div class="header-right">&#128100; 관리자</div>
  </header>

  <!-- 바디: 사이드바 + 메인 -->
  <div class="app-body">
    <aside id="sidebar" class="app-sidebar">
      {% block sidebar %}{% endblock %}
    </aside>
    <main class="app-main">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- 푸터 -->
  <footer class="border-top py-3 bg-light">
    <div class="container text-center text-muted small">
      게시판 앱 &nbsp;|&nbsp; 최종 배포: {{ deployed_at }}
    </div>
  </footer>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmZqZMkiYAAA9gOLJnXExhyS2RnT"
    crossorigin="anonymous"
  ></script>
  <script>
    (function () {
      var toggle = document.getElementById('sidebarToggle');
      var sidebar = document.getElementById('sidebar');
      var main = document.querySelector('.app-main');
      var isMobile = function () { return window.innerWidth < 768; };

      toggle.addEventListener('click', function () {
        if (isMobile()) {
          sidebar.classList.toggle('open');
        } else {
          sidebar.classList.toggle('collapsed');
          main.classList.toggle('sidebar-collapsed');
        }
      });

      // 모바일에서 사이드바 외부 클릭 시 닫기
      document.addEventListener('click', function (e) {
        if (isMobile() && sidebar.classList.contains('open')) {
          if (!sidebar.contains(e.target) && e.target !== toggle) {
            sidebar.classList.remove('open');
          }
        }
      });
    })();
  </script>
</body>
</html>
