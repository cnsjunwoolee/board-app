<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Become a friend - 로그인</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <style>
    :root { --lg-brand: #A50034; }
    body {
      background: #f2f3f5; display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .login-card {
      background: #fff; border-radius: 6px; padding: 2.5rem 2rem;
      width: 100%; max-width: 380px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .login-brand {
      text-align: center; margin-bottom: 2rem;
    }
    .login-brand h1 {
      font-size: 1.3rem; font-weight: 800; color: var(--lg-brand); margin: 0;
    }
    .login-brand p {
      font-size: 0.82rem; color: #888; margin: 0.25rem 0 0;
    }
    .login-bar {
      width: 40px; height: 3px; background: var(--lg-brand);
      margin: 0.75rem auto 0; border-radius: 2px;
    }
    .btn-login {
      background: var(--lg-brand); border: none; color: #fff; font-weight: 600;
      width: 100%; padding: 0.6rem; border-radius: 4px; font-size: 0.9rem;
    }
    .btn-login:hover { background: #8a002b; color: #fff; }
    .form-control:focus { border-color: var(--lg-brand); box-shadow: 0 0 0 0.2rem rgba(165,0,52,0.15); }
    .error-msg { color: var(--lg-brand); font-size: 0.82rem; text-align: center; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <h1>Become a friend</h1>
      <p>운영진 로그인</p>
      <div class="login-bar"></div>
    </div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post" action="/auth/login">
      <div class="mb-3">
        <label for="username" class="form-label" style="font-size:0.82rem; font-weight:600;">아이디</label>
        <input type="text" id="username" name="username" class="form-control form-control-sm"
               required autofocus placeholder="아이디를 입력하세요" />
      </div>
      <div class="mb-4">
        <label for="password" class="form-label" style="font-size:0.82rem; font-weight:600;">비밀번호</label>
        <input type="password" id="password" name="password" class="form-control form-control-sm"
               required placeholder="비밀번호를 입력하세요" />
      </div>
      <button type="submit" class="btn btn-login">로그인</button>
    </form>
  </div>
</body>
</html>
