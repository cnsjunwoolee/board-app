{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">

    <!-- 제목 영역 -->
    <div class="mb-4">
      <h2 class="h3 mb-2">{{ post.title }}</h2>
      <div class="text-muted small d-flex gap-3">
        <span>작성자: <strong>{{ post.author }}</strong></span>
        <span>작성일시: {{ post.created_at.strftime('%Y-%m-%d %H:%M') }}</span>
      </div>
    </div>

    <hr />

    <!-- 본문 영역 -->
    <div class="post-content py-3">
      {{ post.content }}
    </div>

    <hr />

    <!-- 버튼 영역 -->
    <div class="d-flex justify-content-between align-items-center mt-3">
      <a href="/" class="btn btn-outline-secondary btn-sm">목록으로</a>
      <div class="d-flex gap-2">
        <a href="/posts/{{ post.id }}/edit" class="btn btn-outline-primary btn-sm">수정</a>

        <!-- 삭제: form POST 방식 -->
        <form
          action="/posts/{{ post.id }}/delete"
          method="post"
          onsubmit="return confirm('정말 삭제하시겠습니까?');"
        >
          <button type="submit" class="btn btn-outline-danger btn-sm">삭제</button>
        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
