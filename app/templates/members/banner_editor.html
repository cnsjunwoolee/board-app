{% extends "layout_member.html" %}

{% block member_content %}

<!-- Quill CDN -->
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">

<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="h5 mb-0">회원모집 배너 편집</h2>
  <a href="/recruit/banner/view" target="_blank" class="btn btn-outline-secondary btn-sm">
    미리보기
  </a>
</div>

{% if banner and banner.updated_at %}
<p class="text-muted small mb-3">마지막 저장: {{ banner.updated_at.strftime('%Y-%m-%d %H:%M:%S') }}</p>
{% endif %}

<form method="post" action="/recruit/banner" id="banner-form">
  <!-- Quill 에디터 컨테이너 -->
  <div id="editor" style="min-height: 300px; background: #fff;"></div>
  <!-- hidden input으로 내용 전달 -->
  <input type="hidden" name="content" id="content-input">

  <div class="mt-3 d-flex gap-2">
    <button type="submit" class="btn btn-primary">저장</button>
    <a href="/members/" class="btn btn-outline-secondary">취소</a>
  </div>
</form>

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script>
const quill = new Quill('#editor', {
  theme: 'snow',
  modules: {
    toolbar: [
      [{ 'font': [] }, { 'size': ['small', false, 'large', 'huge'] }],
      ['bold', 'italic', 'underline', 'strike'],
      [{ 'color': [] }, { 'background': [] }],
      [{ 'script': 'sub' }, { 'script': 'super' }],
      [{ 'header': 1 }, { 'header': 2 }, 'blockquote', 'code-block'],
      [{ 'list': 'ordered' }, { 'list': 'bullet' }, { 'indent': '-1' }, { 'indent': '+1' }],
      [{ 'direction': 'rtl' }, { 'align': [] }],
      ['link', 'image', 'video'],
      ['clean']
    ]
  }
});

// 기존 내용 로드
{% if banner and banner.content %}
quill.root.innerHTML = {{ banner.content | tojson }};
{% endif %}

// 폼 제출 시 에디터 내용을 hidden input에 복사
document.getElementById('banner-form').addEventListener('submit', function () {
  document.getElementById('content-input').value = quill.root.innerHTML;
});
</script>

{% endblock %}
